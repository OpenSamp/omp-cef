name: Build & Publish

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build cef.so (linux x64, vcpkg)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config curl zip unzip tar

      - name: Bootstrap vcpkg
        # lukka/run-vcpkg@v11 ожидает vcpkg как сабмодуль или валидный путь и
        # ломается на чистом репо. Bootstrap'им руками — то же что мы делаем в
        # Dockerfile, плюс GHA-cache на installed/ и archives/ для binary cache.
        run: |
          set -e
          VCPKG_DIR="$GITHUB_WORKSPACE/vcpkg"
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_DIR"
          git -C "$VCPKG_DIR" checkout 3f51ee54c1b56a8c84cdd23eb1b6a7eaf65bb01f
          "$VCPKG_DIR/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$VCPKG_DIR" >> "$GITHUB_ENV"

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg/installed
            ~/.cache/vcpkg/archives
          key:  vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_TOOLCHAIN_FILE=${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_MANIFEST_FEATURES=server \
            -DBUILD_SERVER_OMP=ON

      - name: Build
        run: cmake --build build --config RelWithDebInfo

      - name: Stage artifact
        run: |
          mkdir -p artifact-stage
          # Component output location varies — search the build tree for any .so under server/.
          find build -path '*/server/*' -name '*.so' -exec cp {} artifact-stage/ \;
          ls -la artifact-stage/
          test -n "$(ls -A artifact-stage/)" || (echo "::error::no .so produced under build/**/server/"; exit 1)

      - name: Generate artifact Dockerfile
        run: |
          cat > artifact-stage/Dockerfile <<'EOF'
          FROM scratch
          COPY *.so /
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push artifact image
        uses: docker/build-push-action@v5
        with:
          context: artifact-stage
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
